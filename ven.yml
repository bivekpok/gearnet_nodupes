name: gearnet
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10.13  # Pinned for reproducibility
  - pip=23.3.1
  
  # PyTorch ecosystem
  - pytorch=2.2.2
  - torchvision=0.17.2
  - torchaudio=2.2.2
  - pytorch-cuda=12.1  # Must match cluster CUDA version
  
  # Scientific computing
  - numpy=1.26.4
  - scipy=1.13.0
  - scikit-learn=1.4.0
  
  # Data handling
  - pandas=2.2.1
  - networkx=3.2.1
  
  # Visualization
  - matplotlib=3.8.3
  
  # Utilities
  - tqdm=4.66.2
  - jupyter=1.0.0  # Optional but recommended
  
  # Pip packages
  - pip:
    - rdkit-pypi==2023.9.5
    - biopython==1.83
    - wandb==0.16.3
    -e ./torchdrug-modified  # Add this AFTER manually installing your vendored copy
